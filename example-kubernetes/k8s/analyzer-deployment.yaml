apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer
  namespace: streaming-iot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analyzer
  template:
    metadata:
      labels:
        app: analyzer
    spec:
      containers:
        - name: analyzer
          image: iot-analyzer:v1
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: iot-config
